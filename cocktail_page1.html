<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drink Website</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/liquor_styles.css">
</head>
<body>
    <h1>Select Your Liquor</h1>
    <p>Choose which Liquors you have</p>
  <div class="checkbox-flex">
    <label class="checkbox-button" id="bourbon">
      <input type="checkbox" name="liquor" value="Bourbon" />
      Bourbon
    </label>

    <label class="checkbox-button" id="rye">
      <input type="checkbox" name="liquor" value="Rye" />
      Rye
    </label>

    <label class="checkbox-button" id="vodka">
      <input type="checkbox" name="liquor" value="Vodka" />
      Vodka
    </label>

    <label class="checkbox-button" id="gin">
      <input type="checkbox" name="liquor" value="Gin" />
      Gin
    </label>

    <label class="checkbox-button" id="tequila">
      <input type="checkbox" name="liquor" value="Tequila" />
      Tequila
    </label>

    <label class="checkbox-button" id="rum">
      <input type="checkbox" name="liquor" value="Rum" />
      Rum
    </label>
  </div>

  <br />
  <button id="nextPageBtn">Submit</button>
</body>
</html>
