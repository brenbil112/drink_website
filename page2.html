<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredients</title>
    <script src="page2script.js" defer></script>
</head>
<body>
    <h1>Select Your Ingredients</h1>

    <p>Choose which ingredients you have</p>

    <input type="checkbox" id="sodaWater" name="ingredient" value="Soda Water">
    <label for="sodaWater">Soda water</label><br>

    <input type="checkbox" id="tonicWater" name="ingredient" value="Tonic Water">
    <label for="tonicWater">Tonic water</label><br>

    <input type="checkbox" id="gingerAle" name="ingredient" value="Ginger Ale">
    <label for="gingerAle">Ginger ale</label><br>

    <input type="checkbox" id="bitters" name="ingredient" value="Bitters">
    <label for="bitters">Bitters</label><br>

    <input type="checkbox" id="simpleSyrup" name="ingredient" value="Simple Syrup">
    <label for="simpleSyrup">Simple syrup</label><br>

    <input type="checkbox" id="grapefruitSoda" name="ingredient" value="Grapefruit Soda">
    <label for="grapefruitSoda">Grapefruit soda</label><br>

    <input type="checkbox" id="limeJuice" name="ingredient" value="Lime Juice">
    <label for="limeJuice">Lime juice</label><br>

    <input type="checkbox" id="lemonJuice" name="ingredient" value="Lemon Juice">
    <label for="lemonJuice">Lemon juice</label><br>

    <input type="checkbox" id="tripleSec" name="ingredient" value="Triple Sec">
    <label for="tripleSec">Triple sec</label><br>

    <input type="checkbox" id="mint" name="ingredient" value="Mint">
    <label for="mint">Mint</label><br>

    <input type="checkbox" id="vermouth" name="ingredient" value="Vermouth">
    <label for="vermouth">Vermouth</label><br>

    <input type="checkbox" id="grenadine" name="ingredient" value="Grenadine">
    <label for="grenadine">Grenadine</label><br>    

    <input type="checkbox" id="campari" name="ingredient" value="Campari">
    <label for="campari">Campari</label><br>

    <br>
    <button id="submitBtn">Submit</button>

    <hr>
    <h2>Selected liquors:</h2>
    <ul id="selectedLiquors"></ul> 

</body>
</html>
