<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredients</title>
    <script src="page2script.js"></script>
</head>
<body>
    <h1>Select Your Ingredients</h1>
    <form action="/submit" method="POST">
        <p>Choose which Ingredients you have</p>
        <input type="checkbox" id="sodaWater" name="ingredient" value="sodaWater">
        <label for="sodaWater">Soda water</label><br>

        <input type="checkbox" id="tonicWater" name="ingredient" value="tonicWater">
        <label for="tonicWater">Tonic water</label><br>

        <input type="checkbox" id="gingerAle" name="ingredient" value="gingerAle">
        <label for="gingerAle">Ginger ale</label><br>

        <input type="checkbox" id="bitters" name="ingredient" value="bitters">
        <label for="bitters">Bitters</label><br>

        <input type="checkbox" id="simpleSyrup" name="ingredient" value="simpleSyrup">
        <label for="simpleSyrup">Simple syrup</label><br>

        <input type="checkbox" id="grapefruitSoda" name="ingredient" value="grapefruitSoda">
        <label for="grapefruitSoda">Grapefruit soda</label><br>
        
        <br>
        <input type="submit" value="Submit">
    </form>
    <hr>
    <h2>Selected liquors: </h2>
    <ul id="selectedLiquors"></ul>  

    </body>
</html>
