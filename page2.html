<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ingredients</title>
  <script src="page2script.js" defer></script>
  <link rel="stylesheet" href="css/ingredient_styles.css" />
</head>
<body>
  <h1>Select Your Ingredients</h1>
  <p>Choose which ingredients you have</p>

  <div class="collapsible-container">
    <div class="ingredient-section">
      <button type="button" class="collapsible">Fruit Juices</button>
      <div class="content">
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Lime Juice" />
          Lime juice
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Lemon Juice" />
          Lemon juice
        </label>
      </div>
    </div>

    <div class="ingredient-section">
      <button type="button" class="collapsible">Soda</button>
      <div class="content">
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Ginger Ale" />
          Ginger ale
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Grapefruit Soda" />
          Grapefruit soda
        </label>
      </div>
    </div>
  </div>

  <!-- Ungrouped Ingredients -->
  <div class="collapsible-container">
    <div class="ingredient-section">
      <div class="content" style="display: flex; flex-wrap: wrap; gap: 12px; padding: 10px 16px;">
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Soda Water" />
          Soda water
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Tonic Water" />
          Tonic water
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Bitters" />
          Bitters
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Simple Syrup" />
          Simple syrup
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Triple Sec" />
          Triple sec
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Mint" />
          Mint
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Vermouth" />
          Vermouth
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Grenadine" />
          Grenadine
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Campari" />
          Campari
        </label>
      </div>
    </div>
  </div>

  <br />
  <button id="submitBtn">Submit</button>

  <hr />
  <h2>Selected liquors:</h2>
  <p id="selectedLiquors"></p>
</body>
</html>
