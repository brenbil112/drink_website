<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>&#127819 Ingredients</title>
  <script src="page2script.js" defer></script>
  <script src="scripts/header_script.js" defer></script>
  <link rel="stylesheet" href="css/ingredient_styles.css" />
  <link rel="stylesheet" href="css/header_styles.css" />
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="nav-logo">&#129347 Highballer.app</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a class="coming-soon" href="index.html">Favorites</a>
        <a class="coming-soon" href="index.html">Recipe Submission</a>
        <a class="coming-soon" href="index.html">Contact</a>
      </div>
    </nav>
  </header>
  <h1>Select Your Ingredients</h1>
  <p>Choose which ingredients you have</p>

  <div class="collapsible-container">

    <!-- Fruit Juices Section -->
    <div class="ingredient-section">
      <button type="button" class="collapsible">Fruit Juices</button>
      <div class="content">
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Lime Juice" />
          Lime juice
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Lemon Juice" />
          Lemon juice
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Orange Juice" />
          Orange juice
        </label>
      </div>
    </div>

    <!-- Liqueurs / Wines Section -->
    <div class="ingredient-section">
      <button type="button" class="collapsible">Liqueurs / Wines</button>
      <div class="content">
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Campari" />
          Campari
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Triple Sec" />
          Triple Sec
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Vermouth" />
          Vermouth
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Port" />
          Port
        </label>
      </div>
    </div>

    <!-- Soda Section -->
    <div class="ingredient-section">
      <button type="button" class="collapsible">Soda</button>
      <div class="content">
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Ginger Ale" />
          Ginger ale
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Grapefruit Soda" />
          Grapefruit soda
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Cola" />
          Cola
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Sprite" />
          Sprite
        </label>
      </div>
    </div>

    <!-- Miscellaneous / Ungrouped -->
    <div class="ingredient-section">
      <button type="button" class="collapsible">Other Ingredients</button>
      <div class="content">
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Soda Water" />
          Soda water
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Tonic Water" />
          Tonic water
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Bitters" />
          Bitters
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Simple Syrup" />
          Simple syrup
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Mint" />
          Mint
        </label>
        <label class="checkbox-button">
          <input type="checkbox" name="ingredient" value="Grenadine" />
          Grenadine
        </label>
      </div>
    </div>

  </div>

  <br />
  <button id="submitBtn">Submit</button>

  <hr />
  <h2>Selected liquors:</h2>
  <p id="selectedLiquors"></p>
</body>
</html>
